<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx Labs | Web OS Ultimate</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        :root {
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --danger: #ff3366;
            --success: #00e676;
            --glass-bg: rgba(20, 20, 25, 0.35);
            --glass-border: rgba(255, 255, 255, 0.12);
            --glass-blur: blur(30px) saturate(180%);
            --panel-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            background-color: #050505;
        }

        #bg-layer {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            z-index: -2; transition: background-image 1.5s ease-in-out;
            background-color: #0a0a0f;
        }

        #workspace {
            position: relative;
            width: 100vw;
            height: 100vh;
            padding: 20px;
            z-index: 1;
        }

        /* İleri Seviye Glassmorphism Panel */
        .glass-panel {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            box-shadow: var(--panel-shadow);
            display: flex;
            flex-direction: column;
            touch-action: none;
            overflow: hidden;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .glass-panel.focused {
            border-color: rgba(0, 255, 204, 0.3);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 204, 0.05);
        }

        .panel-header {
            height: 42px;
            padding: 0 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            cursor: move;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .panel-controls {
            display: flex;
            gap: 10px;
        }

        .control-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }
        .dot-close { background: var(--danger); box-shadow: 0 0 8px rgba(255, 51, 102, 0.4); }
        .dot-close:hover { transform: scale(1.2); filter: brightness(1.2); }

        .panel-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #eee;
        }

        .scroll-content {
            flex: 1;
            overflow: auto;
            position: relative;
            background: rgba(0, 0, 0, 0.1);
        }

        /* Alt Dock Tasarımı */
        #taskbar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            height: 70px;
            background: rgba(15, 15, 25, 0.4);
            backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .dock-item {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .dock-item:hover {
            transform: translateY(-12px) scale(1.15);
            background: var(--accent);
            color: #000;
            box-shadow: 0 10px 25px var(--accent-glow);
            border-color: var(--accent);
        }

        /* Form Elemanları */
        .btn-action {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        .btn-action:hover { 
            background: var(--accent); 
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        input, textarea, select {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            margin-bottom: 18px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent); }

        #three-container { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* Modal Tasarımı */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 2000;
            backdrop-filter: blur(15px);
        }
        .overlay.open { display: flex; }
        .modal-content {
            width: 420px; 
            background: rgba(20, 20, 25, 0.8); 
            border: 1px solid var(--glass-border);
            padding: 35px; 
            border-radius: 28px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
        }

        iframe { border: none; width: 100%; height: 100%; border-radius: 0 0 20px 20px; background: transparent; }
        
        /* Widgetlar */
        .widget-clock { padding: 30px; text-align: center; }
        .clock-time { font-family: 'Space Grotesk'; font-size: 3.5rem; font-weight: 700; color: var(--accent); line-height: 1; }
        .clock-date { margin-top: 10px; opacity: 0.6; font-size: 0.9rem; letter-spacing: 1px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="three-container"></div>

    <div id="workspace"></div>

    <!-- Dock / Taskbar -->
    <div id="taskbar">
        <div class="dock-item" onclick="openCreator()" title="Yeni Pencere Ekle">
            <i data-lucide="plus-circle"></i>
        </div>
        <div style="width:1px; height:35px; background:rgba(255,255,255,0.1); margin: 0 5px;"></div>
        <div class="dock-item" onclick="changeBgOffset(1)" title="Arkaplan Değiştir">
            <i data-lucide="monitor"></i>
        </div>
        <div class="dock-item" onclick="resetSystem()" title="Sistemi Sıfırla">
            <i data-lucide="zap"></i>
        </div>
    </div>

    <!-- Modal: Pencere Oluşturucu -->
    <div class="overlay" id="creator-modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px; font-family: 'Space Grotesk'; letter-spacing: -1px;">Modül Entegrasyonu</h2>
            
            <label style="font-size: 0.65rem; opacity: 0.5; font-weight: 800; letter-spacing: 1px;">PENCERE İSMİ</label>
            <input type="text" id="new-title" placeholder="Örn: Çalışma Alanı">
            
            <label style="font-size: 0.65rem; opacity: 0.5; font-weight: 800; letter-spacing: 1px;">İÇERİK MODELİ</label>
            <select id="new-type">
                <option value="html">Kod / Zengin Metin (HTML)</option>
                <option value="url">Harici Web Sayfası (URL)</option>
            </select>

            <label style="font-size: 0.65rem; opacity: 0.5; font-weight: 800; letter-spacing: 1px;">İÇERİK KAYNAĞI</label>
            <textarea id="new-content" rows="4" placeholder="Metin girin veya https:// ile başlayan bir link..."></textarea>

            <div style="display:flex; gap:12px; margin-top:15px;">
                <button class="btn-action" style="flex:1; justify-content:center;" onclick="closeCreator()">VAZGEÇ</button>
                <button class="btn-action" style="flex:1; justify-content:center; background:var(--accent); color:#000;" onclick="createNewModule()">SİSTEME EKLE</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Uygulama Durumu (State) ---
        let modules = JSON.parse(localStorage.getItem('nyx_os_v2_modules')) || [
            { id: 'clock', title: 'Sistem Zamanı', type: 'widget', x: 60, y: 60, w: 340, h: 200, active: true, zIndex: 10 },
            { id: 'welcome', title: 'Nyx Labs OS 4.0', type: 'html', content: '<div style="padding:25px;"><h3 style="color:var(--accent);">Sistem Hazır.</h3><p style="margin-top:15px; opacity:0.8; font-size:0.95rem; line-height:1.6;">Nyx Labs WebOS Ultimate sürümüne hoş geldiniz. Glassmorphism arayüzü ile masaüstünüzü tamamen kişiselleştirebilirsiniz.<br><br>Alt barı kullanarak yeni web uygulamaları veya not alanları eklemeye başlayın.</p></div>', x: 440, y: 60, w: 400, h: 280, active: true, zIndex: 10 }
        ];
        
        let bgIndex = parseInt(localStorage.getItem('nyx_os_v2_bg')) || 1;
        const save = () => localStorage.setItem('nyx_os_v2_modules', JSON.stringify(modules));

        // --- 2. Arayüz Yönetimi ---
        function renderWorkspace() {
            const ws = document.getElementById('workspace');
            ws.innerHTML = '';

            modules.forEach(mod => {
                if(!mod.active) return;
                
                const panel = document.createElement('div');
                panel.className = 'glass-panel';
                panel.id = `mod-${mod.id}`;
                panel.style.width = mod.w + 'px';
                panel.style.height = mod.h + 'px';
                panel.style.transform = `translate(${mod.x}px, ${mod.y}px)`;
                panel.style.zIndex = mod.zIndex || 10;

                panel.innerHTML = `
                    <div class="panel-header" onmousedown="focusWindow('${mod.id}')">
                        <div class="panel-title"><i data-lucide="terminal" style="width:14px"></i> ${mod.title}</div>
                        <div class="panel-controls">
                            <div class="control-dot dot-close" onclick="closeModule('${mod.id}')"></div>
                        </div>
                    </div>
                    <div class="scroll-content" id="content-${mod.id}">
                        ${getContent(mod)}
                    </div>
                `;
                ws.appendChild(panel);
            });
            
            lucide.createIcons();
            setupInteractions();
        }

        function getContent(mod) {
            if(mod.id === 'clock') return `<div class="widget-clock"><div id="clock-val" class="clock-time">00:00</div><div id="date-val" class="clock-date">Yükleniyor...</div></div>`;
            if(mod.type === 'url') return `<iframe src="${mod.content}" allow="fullscreen"></iframe>`;
            return mod.content || '';
        }

        // --- 3. Pencere Etkileşimleri ---
        function setupInteractions() {
            interact('.glass-panel').draggable({
                allowFrom: '.panel-header',
                listeners: {
                    move(event) {
                        const target = event.target;
                        const id = target.id.replace('mod-', '');
                        const mod = modules.find(m => m.id === id);
                        mod.x += event.dx;
                        mod.y += event.dy;
                        target.style.transform = `translate(${mod.x}px, ${mod.y}px)`;
                    },
                    end() { save(); }
                }
            }).resizable({
                edges: { left: true, right: true, bottom: true, top: true },
                listeners: {
                    move(event) {
                        const target = event.target;
                        const id = target.id.replace('mod-', '');
                        const mod = modules.find(m => m.id === id);
                        mod.w = event.rect.width;
                        mod.h = event.rect.height;
                        mod.x += event.deltaRect.left;
                        mod.y += event.deltaRect.top;
                        target.style.width = mod.w + 'px';
                        target.style.height = mod.h + 'px';
                        target.style.transform = `translate(${mod.x}px, ${mod.y}px)`;
                    },
                    end() { save(); }
                }
            });
        }

        function focusWindow(id) {
            // Tüm panellerden odak sınıfını kaldır
            document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('focused'));
            
            const maxZ = Math.max(...modules.map(m => m.zIndex || 10), 10);
            const mod = modules.find(m => m.id === id);
            mod.zIndex = maxZ + 1;
            
            const el = document.getElementById(`mod-${id}`);
            if (el) {
                el.style.zIndex = mod.zIndex;
                el.classList.add('focused');
            }
        }

        function closeModule(id) {
            modules = modules.filter(m => m.id !== id);
            save();
            renderWorkspace();
        }

        // --- 4. Modül Oluşturma ---
        function openCreator() { document.getElementById('creator-modal').classList.add('open'); }
        function closeCreator() { document.getElementById('creator-modal').classList.remove('open'); }

        function createNewModule() {
            const title = document.getElementById('new-title').value || 'Pencere';
            const type = document.getElementById('new-type').value;
            const content = document.getElementById('new-content').value;

            if(!content) return;

            const newMod = {
                id: 'custom-' + Date.now(),
                title,
                type,
                content,
                x: 150 + (modules.length * 25),
                y: 150 + (modules.length * 25),
                w: 450,
                h: 350,
                active: true,
                zIndex: 100
            };

            modules.push(newMod);
            save();
            renderWorkspace();
            closeCreator();
            
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').value = '';
        }

        // --- 5. Görselleştirme ve Yardımcılar ---
        function changeBgOffset(o) {
            bgIndex = ((bgIndex + o - 1 + 15) % 15) + 1;
            // Picsum üzerinden estetik doğa/teknoloji görselleri çekiyoruz
            document.getElementById('bg-layer').style.backgroundImage = `url('https://picsum.photos/id/${bgIndex + 20}/1920/1080?blur=1')`;
            localStorage.setItem('nyx_os_v2_bg', bgIndex);
        }

        function resetSystem() {
            if(confirm('Tüm kişiselleştirmeler ve açık pencereler sıfırlanacak. Onaylıyor musunuz?')) {
                localStorage.removeItem('nyx_os_v2_modules');
                location.reload();
            }
        }

        function updateTime() {
            const now = new Date();
            const c = document.getElementById('clock-val');
            const d = document.getElementById('date-val');
            if(c) c.innerText = now.toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit'});
            if(d) d.innerText = now.toLocaleDateString('tr-TR', {day:'numeric', month:'long', year: 'numeric'});
            setTimeout(updateTime, 1000);
        }

        // --- 6. 3D Parçacık Arkaplan (Three.js) ---
        function init3D() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const stars = new THREE.Group();
            scene.add(stars);

            const geometry = new THREE.BufferGeometry();
            const starPoints = [];
            for(let i=0; i<1500; i++) {
                starPoints.push((Math.random()-0.5)*50, (Math.random()-0.5)*50, (Math.random()-0.5)*50);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPoints, 3));
            
            const material = new THREE.PointsMaterial({ color: 0x00ffcc, size: 0.05, transparent: true, opacity: 0.4 });
            const points = new THREE.Points(geometry, material);
            stars.add(points);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            camera.position.z = 15;

            function animate() {
                requestAnimationFrame(animate);
                stars.rotation.y += 0.0005;
                stars.rotation.x += 0.0002;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        window.onload = () => {
            changeBgOffset(0); 
            renderWorkspace();
            init3D();
            updateTime();
        };
    </script>
</body>
</html>
