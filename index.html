<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verimlilik Merkezi</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        html, body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
            height: 100vh;
            overflow: hidden; /* Sayfanın kaymasını engelle */
        }
        
        /* Ana 3 Sütunlu Yapı */
        #main-layout {
            display: grid;
            grid-template-columns: 300px 1fr 240px; /* Sol | Orta | Sağ (Sağ daraltıldı) */
            height: calc(100vh - 80px); /* Spotify çaları hariç yükseklik */
        }

        /* Orta sütun not defteri için */
        /* #notepad { ... } */ /* Bu stil kaldırıldı */

        /* Kaydırma çubukları */
        .scrollable-content {
            overflow-y: auto;
            height: 100%;
        }
        .scrollable-content::-webkit-scrollbar {
            width: 6px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
        .scrollable-content::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Ana İçerik Alanı (3 Sütunlu) -->
    <div id="main-layout" class="w-full">
        
        <!-- 1. SOL SÜTUN (Bilgi Paneli) -->
        <aside classs="bg-gray-50 border-r border-gray-200">
            <div class="scrollable-content p-6">
                <!-- Başlık -->
                <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight mb-6">Dashboard</h1>
                
                <!-- Saat ve Tarih -->
                <div class="mb-6 p-4 bg-white rounded-xl shadow-lg border border-gray-100 text-center">
                    <div id="clock" class="text-5xl font-bold text-gray-800 tracking-tight">00:00:00</div>
                    <div id="date" class="text-lg text-gray-600 mt-1">1 Ocak 2025, Çarşamba</div>
                </div>

                <!-- Hava Durumu -->
                <div class="mb-6 p-4 bg-white rounded-xl shadow-lg border border-gray-100">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-xl font-semibold text-gray-800">Hava Durumu</h2>
                        <button id="refreshWeather" class="p-1 text-gray-500 hover:text-blue-600">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div id="weather-content" class="flex items-center">
                        <i id="weather-icon" data-lucide="loader" class="w-12 h-12 text-blue-500 mr-4 animate-spin"></i>
                        <div>
                            <div id="weather-temp" class="text-3xl font-bold text-gray-800">...</div>
                            <div id="weather-city" class="text-gray-600">Konum alınıyor...</div>
                        </div>
                    </div>
                    <p id="weather-desc" class="text-gray-500 mt-2 text-sm"></p>
                </div>

                <!-- Hızlı Arama -->
                <div class="mb-6 p-4 bg-white rounded-xl shadow-lg border border-gray-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Hızlı Arama</h2>
                    <!-- Google Arama -->
                    <form id="googleSearchForm" class="flex items-center mb-3">
                        <input type="text" id="googleSearchQuery" placeholder="Google..."
                               class="w-full p-2 text-sm text-gray-700 border border-gray-300 rounded-l-lg focus:ring-blue-500 focus:border-blue-500" required>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-r-lg">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </button>
                    </form>
                    <!-- Bing Arama -->
                    <form id="bingSearchForm" class="flex items-center">
                        <input type="text" id="bingSearchQuery" placeholder="Bing..."
                               class="w-full p-2 text-sm text-gray-700 border border-gray-300 rounded-l-lg focus:ring-blue-500 focus:border-blue-500" required>
                        <button type="submit" class="bg-gray-700 hover:bg-gray-800 text-white p-2 rounded-r-lg">
                            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"><path d="M12.4 20.8v-9.2l-4.8 1.6V11l5.2-1.6h.4v11.2l-6 1.6v2l6-1.6h.4v3.6h1.6V22l8.4 2.8v-2l-8.4-2.8v-5.2l8.4 2.8v-2l-8.4-2.8V9.6l8.4 2.8v-2L14 7.6v-.4h1.6v12l-3.2-1.2z"></path></svg>
                        </button>
                    </form>
                </div>
                
                <!-- Bildirimler Buradan Kaldırıldı -->

            </div>
        </aside>

        <!-- 2. ORTA SÜTUN (Ana İçerik - Bing Arama Merkezi) -->
        <main class="border-r border-gray-200 bg-white relative overflow-hidden h-full">
            
            <!-- Arama Bloğu (Varsayılan olarak görünür) -->
            <div id="bingSearchBlock" class="w-full max-w-2xl text-center mx-auto p-8">
                <!-- Bing Logosu (Basit SVG) -->
                <svg class="w-24 h-24 mx-auto mb-6 text-gray-700" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="currentColor"><path d="M12.4 20.8v-9.2l-4.8 1.6V11l5.2-1.6h.4v11.2l-6 1.6v2l6-1.6h.4v3.6h1.6V22l8.4 2.8v-2l-8.4-2.8v-5.2l8.4 2.8v-2l-8.4-2.8V9.6l8.4 2.8v-2L14 7.6v-.4h1.6v12l-3.2-1.2z"></path></svg>
                <h2 class="text-3xl font-bold text-gray-800 mb-6">Bing Arama Merkezi</h2>
                <form id="centerBingSearchForm" class="flex items-center">
                    <input type="text" id="centerBingSearchQuery" placeholder="Bing'de veya web'de arama yapın..."
                           class="w-full p-4 text-lg text-gray-700 border border-gray-300 rounded-l-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150"
                           required>
                    <button type="submit"
                            class="bg-gray-700 hover:bg-gray-800 text-white p-4 rounded-r-lg flex items-center justify-center transition duration-150 shadow-md">
                        <i data-lucide="search" class="w-6 h-6"></i>
                    </button>
                </form>
            </div>

            <!-- Sonuç Bloğu (Varsayılan olarak gizli) -->
            <div id="bingResultBlock" class="hidden w-full h-full relative">
                <button id="backToSearchBtn" class="absolute top-4 left-4 bg-white text-gray-700 py-2 px-3 rounded-lg shadow-md border flex items-center text-sm z-10 hover:bg-gray-100 transition">
                    <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Yeni Arama
                </button>
                <!-- UYARI: Burası Bing'in X-Frame-Options engellemesi nedeniyle büyük ihtimalle boş görünecektir. -->
                <iframe id="bingFrame" src="about:blank" class="w-full h-full border-0"></iframe>
            </div>

        </main>

        <!-- 3. SAĞ SÜTUN (Kişisel Widget'lar) -->
        <aside class="bg-gray-50">
            <div class="scrollable-content p-6">
                
                <!-- Gömülü İçerik (Iframe) Bölümü -->
                <div class="mb-6">
                    <h2 class="text-2xl font-semibold mb-4 text-gray-800">Gömülü İçerik</h2>
                    
                    <form id="embedForm" class="p-4 mb-4 border border-blue-200 rounded-lg bg-white">
                        <div class="mb-3">
                            <label for="embedUrl" class="block text-sm font-medium text-gray-700 mb-1">Gömülü URL</label>
                            <input type="url" id="embedUrl" required placeholder="https://... (Gömülebilir bir URL)"
                                   class="w-full p-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="flex justify-end">
                            <button type="submit"
                                    class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-lg transition duration-150 shadow-md text-sm">
                                Kaydet ve Göm
                            </button>
                        </div>
                    </form>

                    <!-- Gömülü İçerik Konteyneri -->
                    <div id="embedContainer" class="w-full h-80 bg-gray-200 rounded-lg border border-gray-300 overflow-hidden flex items-center justify-center">
                        <!-- Iframe buraya JavaScript ile eklenecek -->
                        <p id="embedPlaceholder" class="text-gray-500 p-4 text-center text-sm">Kaydedilmiş gömülü içerik yok veya URL yüklenemiyor.</p>
                    </div>
                </div>

                <!-- Bildirimler Bölümü -->
                <div class="p-4 bg-white rounded-xl shadow-lg border border-gray-100">
                    <h2 class="text-xl font-semibold text-gray-800 mb-3">Bildirimler</h2>
                    <div id="notificationWidget">
                        <div class="flex items-center mb-3">
                            <i id="notificationIcon" data-lucide="bell-off" class="w-5 h-5 text-gray-500 mr-2"></i>
                            <p id="notificationStatus" class="text-gray-600 text-sm font-medium">İzin bekleniyor...</p>
                        </div>
                        <button id="requestNotificationPermissionBtn" class="w-full text-sm bg-blue-600 hover:bg-blue-700 text-white py-2 px-3 rounded-lg transition duration-150 shadow-md flex items-center justify-center">
                            <i data-lucide="check-circle" class="w-4 h-4 mr-2"></i> İzin Ver
                        </button>
                        <button id="sendTestNotificationBtn" class="hidden w-full text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 py-2 px-3 rounded-lg transition duration-150 flex items-center justify-center">
                            <i data-lucide="send" class="w-4 h-4 mr-2"></i> Test Et
                        </button>
                    </div>
                </div>

            </div>
        </aside>

    </div>

    <!-- ALT SPOTIFY ÇALARI -->
    <footer class="w-full h-[80px] bg-gray-900 p-0 shadow-inner">
        <!-- Spotify Gömülü Çalar -->
        <!-- Örnek bir Lofi çalma listesi. Bunu istediğiniz albüm/şarkı/liste URL'i ile değiştirebilirsiniz. -->
        <iframe style="border-radius:0;" 
                src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYEmIw?utm_source=generator&theme=0" 
                width="100%" 
                height="80" 
                frameBorder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy">
        </iframe>
    </footer>

    <!-- Mesaj Kutusu -->
    <div id="messageBox" class="fixed bottom-24 right-4 bg-green-500 text-white p-3 rounded-lg shadow-xl hidden transition-opacity duration-300 opacity-0 z-50"></div>

    <script type="module">
        // --- EVRENSEL DEĞİŞKENLER ---
        const EMBED_URL_KEY = 'productivityHubEmbedUrl'; // Eski widget key yerine bu geldi

        // --- MESAJ FONKSİYONU ---
        function showMessage(text, isError = false) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = isError
                ? 'fixed bottom-24 right-4 bg-red-600 text-white p-3 rounded-lg shadow-xl transition-opacity duration-300 opacity-100 block z-50'
                : 'fixed bottom-24 right-4 bg-green-600 text-white p-3 rounded-lg shadow-xl transition-opacity duration-300 opacity-100 block z-50';

            setTimeout(() => {
                messageBox.classList.remove('opacity-100');
                messageBox.classList.add('opacity-0');
                setTimeout(() => messageBox.classList.add('hidden'), 300);
            }, 3000);
        }
        
        // --- BAĞLANTI AÇMA ---
        window.openLink = (url, isExternal = false) => {
            window.open(url, isExternal ? '_blank' : '_self');
        };

        // --- SOL SÜTUN FONKSİYONLARI ---

        // 1. Saat ve Tarih
        function updateTime() {
            const now = new Date();
            const clockEl = document.getElementById('clock');
            const dateEl = document.getElementById('date');

            clockEl.textContent = now.toLocaleTimeString('tr-TR', { hour12: false });
            dateEl.textContent = now.toLocaleDateString('tr-TR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // 2. Hava Durumu
        async function fetchWeather(lat = 38.00, lon = 32.50) { // Fallback: Bolu, Türkiye
            const weatherContent = document.getElementById('weather-content');
            const tempEl = document.getElementById('weather-temp');
            const cityEl = document.getElementById('weather-city');
            const descEl = document.getElementById('weather-desc');
            const iconEl = document.getElementById('weather-icon');

            try {
                // Open-Meteo API (API Key Gerekmez)
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
                if (!response.ok) throw new Error('Hava durumu verisi alınamadı.');
                const data = await response.json();
                
                const weather = data.current_weather;
                tempEl.textContent = `${Math.round(weather.temperature)}°C`;
                cityEl.textContent = `Bolu, Türkiye`; // Koordinat Bolu'ya ayarlı
                descEl.textContent = `Rüzgar: ${weather.windspeed} km/s`;
                
                // WMO Koduna göre ikon belirle (Basitleştirilmiş)
                let iconName = 'sun';
                if (weather.weathercode >= 1 && weather.weathercode <= 3) iconName = 'cloud-sun';
                else if (weather.weathercode > 3 && weather.weathercode <= 50) iconName = 'cloud';
                else if (weather.weathercode > 50 && weather.weathercode <= 70) iconName = 'cloud-drizzle';
                else if (weather.weathercode > 70 && weather.weathercode <= 80) iconName = 'cloud-rain';
                else if (weather.weathercode > 80) iconName = 'cloud-snow';
                else if (weather.weathercode > 90) iconName = 'cloud-lightning';
                
                iconEl.setAttribute('data-lucide', iconName);
                iconEl.classList.remove('animate-spin');
                lucide.createIcons();

            } catch (error) {
                console.error("Hava durumu hatası:", error);
                cityEl.textContent = 'Hata oluştu';
                tempEl.textContent = 'N/A';
                iconEl.setAttribute('data-lucide', 'alert-triangle');
                iconEl.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        function getWeather() {
            const cityEl = document.getElementById('weather-city');
            const iconEl = document.getElementById('weather-icon');
            cityEl.textContent = 'Konum alınıyor...';
            iconEl.setAttribute('data-lucide', 'loader');
            iconEl.classList.add('animate-spin');
            lucide.createIcons();
            
            // Bolu (Türkiye) koordinatlarını varsayılan olarak kullanıyoruz
            fetchWeather(40.7333, 31.6000); 
        }

        // 3. Arama Formları
        function setupSearchForms() {
            const googleForm = document.getElementById('googleSearchForm');
            googleForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = document.getElementById('googleSearchQuery').value.trim();
                if (query) openLink(`https://www.google.com/search?q=${encodeURIComponent(query)}`, true);
            });

            const bingForm = document.getElementById('bingSearchForm');
            bingForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = document.getElementById('bingSearchQuery').value.trim();
                if (query) openLink(`https://www.bing.com/search?q=${encodeURIComponent(query)}`, true);
            });
        }
        
        // 4. Bildirimler
        function setupNotifications() {
            const statusText = document.getElementById('notificationStatus');
            const statusIcon = document.getElementById('notificationIcon');
            const requestBtn = document.getElementById('requestNotificationPermissionBtn');
            const testBtn = document.getElementById('sendTestNotificationBtn');

            function updateNotificationUI(permission) {
                switch (permission) {
                    case 'granted':
                        statusText.textContent = 'Bildirimler aktif.';
                        statusIcon.setAttribute('data-lucide', 'bell-ring');
                        statusIcon.classList.remove('text-gray-500', 'text-red-500');
                        statusIcon.classList.add('text-green-600');
                        requestBtn.classList.add('hidden');
                        testBtn.classList.remove('hidden');
                        break;
                    case 'denied':
                        statusText.textContent = 'Bildirimler engellendi.';
                        statusIcon.setAttribute('data-lucide', 'bell-off');
                        statusIcon.classList.remove('text-gray-500', 'text-green-600');
                        statusIcon.classList.add('text-red-500');
                        requestBtn.classList.add('hidden');
                        testBtn.classList.add('hidden');
                        break;
                    default:
                        statusText.textContent = 'İzin bekleniyor.';
                        statusIcon.setAttribute('data-lucide', 'bell');
                        requestBtn.classList.remove('hidden');
                        testBtn.classList.add('hidden');
                }
                lucide.createIcons();
            }

            if ('Notification' in window) {
                updateNotificationUI(Notification.permission);
            } else {
                statusText.textContent = 'Desteklenmiyor.';
                requestBtn.classList.add('hidden');
                statusIcon.setAttribute('data-lucide', 'x-circle');
            }

            requestBtn.addEventListener('click', () => {
                Notification.requestPermission().then(permission => {
                    updateNotificationUI(permission);
                    if (permission === 'granted') showMessage("Bildirim izni başarıyla alındı!");
                });
            });

            testBtn.addEventListener('click', () => {
                new Notification("Dashboard Test Bildirimi", {
                    body: "Bu, dashboard uygulamanızdan gelen bir test mesajıdır.",
                    icon: "https://placehold.co/64x64/f7f7f7/333?text=🔔"
                });
            });
        }

        // --- ORTA SÜTUN FONKSİYONLARI ---

        // 1. Not Defteri Kaldırıldı, Merkez Bing Araması Eklendi
        function setupCenterBingSearch() {
            const centerBingForm = document.getElementById('centerBingSearchForm');
            const searchBlock = document.getElementById('bingSearchBlock');
            const resultBlock = document.getElementById('bingResultBlock');
            const iframe = document.getElementById('bingFrame');
            const backBtn = document.getElementById('backToSearchBtn');
            // const mainEl = document.querySelector('main'); // Bu artık (hatalı padding için) gerekmiyor

            centerBingForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const query = document.getElementById('centerBingSearchQuery').value.trim();
                if (query) {
                    // Bing arama URL'ini frame'e yükle
                    // UYARI: Bing bunu engelleyecektir.
                    iframe.src = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
                    
                    // Arayüzü değiştir: Arama çubuğunu gizle, frame'i göster
                    // mainEl.classList.remove('p-8'); // <-- Hatalıydı, kaldırıldı
                    searchBlock.classList.add('hidden');
                    resultBlock.classList.remove('hidden');
                    lucide.createIcons(); // Geri tuşu ikonunu render et
                }
            });

            backBtn.addEventListener('click', () => {
                // Arayüzü geri al: Frame'i gizle, arama çubuğunu göster
                iframe.src = 'about:blank'; // Frame'i temizle
                // mainEl.classList.add('p-8'); // <-- Hatalıydı, kaldırıldı
                resultBlock.classList.add('hidden');
                searchBlock.classList.remove('hidden');
            });
        }

        // --- SAĞ SÜTUN FONKSİYONLARI ---

        // Eski widget fonksiyonları (loadWidgets, saveWidgets, renderWidgets, addWidget, deleteWidget, setupWidgetForm) kaldırıldı.

        // 1. Gömülü İçerik Formu Kurulumu
        function setupEmbedForm() {
            const embedForm = document.getElementById('embedForm');
            const embedUrlInput = document.getElementById('embedUrl');

            embedForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const url = embedUrlInput.value.trim();
                if (url) {
                    try {
                        // URL'in geçerli bir formatta olduğundan emin ol
                        new URL(url); 
                        localStorage.setItem(EMBED_URL_KEY, url);
                        renderEmbed(url);
                        showMessage("Gömülü içerik kaydedildi!");
                    } catch (error) {
                        showMessage("Geçersiz URL formatı.", true);
                    }
                }
            });
        }

        // 2. Gömülü İçeriği Ekrana Çiz
        function renderEmbed(url) {
            const container = document.getElementById('embedContainer');
            const placeholder = document.getElementById('embedPlaceholder');
            
            if (container && url) {
                // Konteyneri temizle ve iframe'i ekle
                container.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.className = 'w-full h-full border-0';
                iframe.setAttribute('allowfullscreen', '');
                iframe.setAttribute('allow', 'encrypted-media; autoplay; picture-in-picture');
                
                // Iframe yüklenemezse (örn: X-Frame-Options engeli) placeholder'ı geri getir
                iframe.onerror = () => {
                    container.innerHTML = '';
                    placeholder.textContent = "Bu içerik gömülemiyor (X-Frame-Options).";
                    placeholder.classList.remove('hidden');
                };
                iframe.onload = () => {
                    placeholder.classList.add('hidden');
                };

                container.appendChild(iframe);
                placeholder.classList.remove('hidden'); // Başlangıçta placeholder'ı göster, yüklenince gizle
            } else if (container) {
                // URL yoksa placeholder'ı göster
                container.innerHTML = '';
                container.appendChild(placeholder);
                placeholder.textContent = "Kaydedilmiş gömülü içerik yok.";
                placeholder.classList.remove('hidden');
            }
        }

        // 3. Gömülü İçeriği Yükle (localStorage)
        function loadEmbed() {
            const url = localStorage.getItem(EMBED_URL_KEY);
            const embedUrlInput = document.getElementById('embedUrl');
            if (url) {
                renderEmbed(url);
                embedUrlInput.value = url; // Kayıtlı URL'i forma geri yükle
            } else {
                renderEmbed(null); // Placeholder'ı göster
            }
        }


        // --- UYGULAMAYI BAŞLAT ---
        document.addEventListener('DOMContentLoaded', () => {
            // Sol Sütun
            updateTime();
            setInterval(updateTime, 1000); // Saati her saniye güncelle
            getWeather();
            document.getElementById('refreshWeather').addEventListener('click', getWeather);
            setupSearchForms();
            setupNotifications(); // Buradan çağrılmasına devam ediliyor, ancak HTML'de yeri değişti
            
            // Orta Sütun
            setupCenterBingSearch();
            
            // Sağ Sütun
            loadEmbed();
            setupEmbedForm();

            // Tüm ikonları son bir kez oluştur
            lucide.createIcons();
        });
    </script>
</body>
</html>
